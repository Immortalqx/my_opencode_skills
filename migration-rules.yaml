# Migration rules for my_opencode_skills
#
# Two stages:
#   1. rewrite  — turn specific source paths/strings into @@SKILL_DIR@@ placeholders
#   2. install  — turn @@SKILL_DIR@@ placeholders into absolute install paths
#
# Both stages are driven by the same rule set. The install stage also does an
# in-skill file scan to substitute any bare `scripts/<file>` / `references/<file>`
# / `assets/<file>` references the model would need.

version: 1

# =============================================================================
# REWRITE  — applied in --rewrite mode and as the first pass in --install mode
# =============================================================================
rewrite_rules:
  # Claude Code's ${CLAUDE_SKILL_DIR} env var does not exist in opencode.
  # Replace with the @@SKILL_DIR@@ placeholder; install stage resolves it.
  - id: claude-skill-dir-var
    find: '${CLAUDE_SKILL_DIR}'
    replace: '@@SKILL_DIR@@'
    apply_to: ['*.md']

  # $ARGUMENTS is a Claude Code placeholder expanded at invocation time.
  # opencode reads user input from the conversation, so we ask the model
  # to do the same explicitly.
  - id: drop-arguments-placeholder
    find: '$ARGUMENTS'
    replace: "the user's most recent request"
    apply_to: ['*.md']

  # argument-hint is a Claude Code frontmatter field; opencode ignores it.
  - id: drop-argument-hint
    regex: '^argument-hint:.*\n'
    replace: ''
    apply_to: ['*.md']
    multiline: true

  # allowed-tools is a Claude Code frontmatter field that constrains the model's
  # tool set; opencode uses a different mechanism (`permission` blocks in
  # opencode.json and per-agent frontmatter). Stripping the line avoids noise
  # in the installed SKILL.md without affecting opencode behavior.
  - id: strip-allowed-tools
    regex: '^allowed-tools:.*\n'
    replace: ''
    apply_to: ['*.md']
    multiline: true

  # Convention: every skill's scratch/intermediate output lives under x_temp/.
  # In .md, anything named temp_<word> (a folder path) is renamed to x_temp.
  # We deliberately do NOT touch .py: Python local vars like `temp_dir` and
  # `temp_path` (from tempfile.TemporaryDirectory()) are not folder paths.
  # The negative lookbehind (?<!x_) prevents re-processing x_temp_* patterns
  # that already exist (idempotency).
  - id: rename-temp-folders
    regex: '(?<!x_)\btemp_[a-zA-Z_]+'
    replace: 'x_temp'
    apply_to: ['*.md']

  # One specific Python rename: mock-review's pdf_safety_scan.py has
  # `default="temp_claude/scans"` as an argparse default — that IS a folder
  # path the model writes to, and needs renaming.
  - id: rename-temp-claude-in-py
    find: 'temp_claude'
    replace: 'x_temp'
    apply_to: ['*.py']

# =============================================================================
# INSTALL  — applied only in --install mode (after rewrite_rules)
# =============================================================================
install:
  default_target: '~/.config/opencode/skills'
  in_skill_subdirs: ['scripts', 'references', 'assets']
  cross_skill_pattern: '@@SKILL_DIR:(?P<skill>[\\w-]+)@@'
  single_skill_pattern: '@@SKILL_DIR@@'
  cross_skill_strategy: 'soft'      # collect all skill names first, then substitute
  dry_run_default: true
  apply_flag: '--apply'

# =============================================================================
# VALIDATION  — sanity check before install lands any file
# =============================================================================
validation:
  must_be_zero_per_skill_md:
    - '${CLAUDE_SKILL_DIR}'
    - '$ARGUMENTS'
    - 'temp_claude'
    - 'allowed-tools'
  must_exist_per_skill_md:
    # every skill that uses @@SKILL_DIR@@ must keep at least one occurrence
    # (otherwise the substitution would silently produce a no-op install)
    - '@@SKILL_DIR@@'

# =============================================================================
# MODES — install mode presets
#
# Each mode bundles (target, skills, validation rules) into one named preset.
# Use `--mode <name>` to pick a preset; `--target` and `--skill` can still
# override the preset's defaults (subject to the validation rules below).
#
# Path rule: `target` MUST be either `null` (caller must pass --target) or a
# string starting with `~` so the YAML never contains a user-specific absolute
# path. The repo is shared on GitHub; no machine paths leak in here.
# =============================================================================
modes:
  default:
    description: "只装 mmx-cli 到 opencode 全局 skills 目录"
    target: '~/.config/opencode/skills'
    skills: ['mmx-cli']
    require_target: false
    allow_skill: false

  all:
    description: "装全部 skill 到 opencode 全局 skills 目录"
    target: '~/.config/opencode/skills'
    skills: '~'                  # '~' = 全部发现的 skill
    require_target: false
    allow_skill: false

  select:
    description: "只装 --skill 指定的 skill 到 target（target 可省，默认全局）"
    target: '~/.config/opencode/skills'
    skills: null                 # 强制从 --skill 取
    require_target: false
    allow_skill: true
    requires_skill: true

  literature-survey:
    description: "装文献调研 bundle 到指定项目目录"
    target: null                 # 强制从 --target 取
    skills: [alphaxiv, arxiv, drawio-diagram, paper-reading, research-lit, research-survey-loop]
    require_target: true
    allow_skill: false

  mock-review:
    description: "装模拟审稿 bundle 到指定项目目录"
    target: null
    skills: [alphaxiv, arxiv, paper-reading, research-lit, mock-review]
    require_target: true
    allow_skill: false
